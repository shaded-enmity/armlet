name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install build-essential pkg-config libgmp-dev libncurses-dev libtree-sitter-dev

    - name: make
      run: make armlet HAVE_TREE_SITTER=1

    - name: Smoke test
      run: ./armlet examples/math.aml
